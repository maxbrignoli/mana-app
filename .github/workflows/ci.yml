name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env for CI
        run: cp .env.example .env

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        # Genera il codice da lib/l10n/*.arb prima di analyze/test.
        # `flutter pub get` di solito lo triggera automaticamente, ma su CI
        # ci affidiamo allo step esplicito per non dipendere da side effect.
        run: flutter gen-l10n

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Typecheck backend
        run: npm run typecheck

      - name: Lint backend
        run: npm run lint

      - name: Test backend
        # Esegue i test vitest del backend (api/_lib/**). I test sono unitari
        # (parser, helpers): non toccano DB ne' AI provider reali.
        run: npm test
